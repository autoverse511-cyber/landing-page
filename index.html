    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Tajawal', 'sans-serif'],
            },
            colors: {
              background: '#050505',
              surface: '#0a0a0a',
              primary: '#00ff88', // Neon Green
              secondary: '#00cc66', // Darker Green
              accent: '#f59e0b', // Gold
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'ticker': 'ticker 30s linear infinite',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #00ff88, 0 0 10px #00ff88' },
                '100%': { boxShadow: '0 0 20px #00ff88, 0 0 30px #00ff88' },
              },
              ticker: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #00cc66;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00ff88;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        background-color: #050505;
        color: white;
      }

      /* Cyber Grid Background */
      .bg-grid {
        background-size: 40px 40px;
        background-image: 
          linear-gradient(to right, rgba(0, 255, 136, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      }
      
      /* Scanlines effect */
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        position: fixed;
        pointer-events: none;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 50;
        opacity: 0.15;
      }

      .text-shadow-neon {
        text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      }
    </style>
